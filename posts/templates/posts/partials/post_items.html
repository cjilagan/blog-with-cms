{% for post in posts %}
    <article>
        <h2>
            <a href="{% url 'post_detail' post.slug %}">
                {{ post.title }}
            </a>
        </h2>
        <p>By {{ post.author }} · {{ post.created_at|date:"F j, Y" }}</p>
        <p>{{ post.content|striptags|truncatewords:30 }}</p>
    </article>
{% empty %}
    <p>No published posts yet.</p>
{% endfor %}
